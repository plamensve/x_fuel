<body>

<div class="background"></div>
<div class="container">
    <div class="follow-card">

    <span class="follow-text">

        Последвайте ни във Facebook за актуални цени и анализи на горивата

    </span>

        <a href="https://www.facebook.com/groups/960591129738525" target="_blank">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor"
                 viewBox="0 0 16 16">
                <path d="M16 8.049c0-4.446-3.582-8.049-8-8.049S0 3.603 0 8.049c0 4.017
            2.926 7.347 6.75 7.951v-5.625H4.718V8.049H6.75V6.275
            c0-2.017 1.195-3.131 3.022-3.131.876 0
            1.791.156 1.791.156v1.98h-1.009
            c-.994 0-1.304.617-1.304 1.25v1.519h2.218l-.354
            2.326H9.25V16c3.824-.604 6.75-3.934
            6.75-7.951z"/>

            </svg>
            Facebook група
        </a>

    </div>

    <div class="fuel-card">

        <div class="header">

            <h1>Текущи средни цени на горивата</h1>

            <div class="live-status">
                <span class="live-dot"></span>
                Актуални данни в реално време
            </div>

            <div class="date" id="current-date"></div>

        </div>

        <div class="widget-container">
            <div id="fuelo-widget-container"></div>
        </div>

        <div class="footer">
            Цените се обновяват автоматично
        </div>

    </div>


    <!-- Форма за въвеждане -->

    <div class="submit-card">

        <h2>Сподели цена на гориво</h2>

        <form id="fuel-form">

            <div class="form-group">

                <label for="city">Град</label>

                <input
                        type="text"
                        id="city"
                        placeholder="Например София"
                        required>

            </div>


            <div class="form-group">

                <label for="station">Бензиностанция</label>

                <select id="station" required>

                    <option value="">Избери</option>

                    <option>Petrol</option>
                    <option>Lukoil</option>
                    <option>Shell</option>
                    <option>Eko</option>
                    <option>OMV</option>
                    <option>Rompetrol</option>
                    <option>Круиз</option>
                    <option>Eko Петрол</option>
                    <option>Dieselor</option>

                </select>

            </div>


            <div class="form-group">

                <label>Гориво</label>

                <div class="radio-group">

                    <label>
                        <input type="radio" name="fuel" value="Бензин A95" required>
                        Бензин A95
                    </label>

                    <label>
                        <input type="radio" name="fuel" value="Бензин A98">
                        Бензин A98
                    </label>

                    <label>
                        <input type="radio" name="fuel" value="Дизел">
                        Дизел
                    </label>

                    <label>
                        <input type="radio" name="fuel" value="Газ">
                        Газ
                    </label>

                    <label>
                        <input type="radio" name="fuel" value="Метан">
                        Метан
                    </label>

                </div>

            </div>


            <div class="form-group">

                <label for="price">Цена (€/литър)</label>

                <input
                        type="number"
                        step="0.01"
                        id="price"
                        placeholder="1.65"
                        required>

            </div>


            <button type="submit">Изпрати цена</button>

        </form>

    </div>


    <div id="success-message" class="success-message"></div>

</div>
<script src="fuelo.js"></script>
<script src="script.js"></script>
</body>
</html>
